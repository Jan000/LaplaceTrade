# config/config.yaml
# Central runtime configuration. Loaded by cryptotrader.config.Settings.
# Secrets (API keys) should come from environment variables, NOT this file.

mode: backtest            # backtest | live

exchange:
  id: binance             # any ccxt-supported id (binance, bybit, ...)
  symbol: BTC/USDT
  timeframe: 1h           # 1h was profitable in the sweep (less cost drag, higher win rate)
  # api_key / api_secret are read from env: CT_EXCHANGE__API_KEY, CT_EXCHANGE__API_SECRET

data:
  history_days: 730       # how much history to pull for backtests
  cache_dir: .cache/ohlcv
  # replay_file: models/holdout.parquet   # dashboard sim replays this real slice

# Every indicator window is tunable here (all in bars). Any field can also be
# overridden via env: e.g. CT_FEATURES__RSI_SLOW=21
features:
  atr_period: 14
  vwap_window: 60
  momentum_windows: [3, 5, 15]
  extra_momentum: 30
  volume_spike_window: 30
  zscore_window: 60
  rsi_fast: 7
  rsi_slow: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  stoch_k: 14
  stoch_d: 3
  bollinger_window: 20
  bollinger_std: 2.0
  adx_period: 14
  donchian: 20
  parkinson: 20
  obv_z: 30
  amihud: 20
  fracdiff_d: 0.4         # fractional differentiation order (0..1)
  fracdiff_window: 60

# LightGBM hyperparameters + training controls. Tune freely (or via env, e.g.
# CT_MODEL__N_ESTIMATORS=800 CT_MODEL__LEARNING_RATE=0.02).
model:
  n_estimators: 400
  learning_rate: 0.03
  num_leaves: 63
  max_depth: -1
  min_child_samples: 50
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  class_weight: null      # null = off; "balanced" upweights directional classes (A/B test it)
  random_state: 42        # fix the seed so runs are reproducible & comparable
  eval_fraction: 0.2      # validation slice inside the training data
  test_fraction: 0.25     # held-out slice for the final evaluation/backtest
  use_meta_labeling: true   # secondary "should I act?" model; gives the EV gate a real P(win)

risk:
  account_equity: 10000.0
  risk_per_trade: 0.005   # 0.5 % of equity risked per trade
  atr_stop_mult: 2.0      # (legacy) hard stop multiple; exits now use barriers
  atr_trail_mult: 1.5     # (legacy) trailing distance; exits now use barriers
  max_open_positions: 1
  # --- Cost control ---
  max_leverage: 1.0       # cap notional at 1x equity -> fees stay proportional
  cooldown_bars: 3        # wait N bars after a trade before re-entering
  # Expected-value entry gate: trade only if P(win)*tp-(1-P(win))*sl-cost > min_ev.
  # Self-calibrates to fees (no cost-coupling). Needs meta-labeling for a real P(win).
  use_ev_filter: true
  min_expected_value: 0.0
  min_edge_cost_ratio: 8.0  # legacy fallback, only used when use_ev_filter=false

execution:
  taker_fee: 0.0004       # 4 bps (Binance taker); use maker/VIP fees if you have them
  slippage_bps: 1.0       # assumed slippage in basis points per fill

strategy:
  long_threshold: 0.50    # permissive: the EV gate is now the real filter
  short_threshold: 0.50
  allow_short: true
  # model_path: models/model.pkl          # trained LightGBM model; baseline if unset

# Triple barriers — shared by the training labels AND the trade exits, so the
# backtest/live engine harvests exactly what the model was trained to predict.
barriers:
  tp_mult: 1.5            # take-profit distance in ATR units
  sl_mult: 1.0            # stop-loss distance in ATR units
  horizon: 15            # time-based exit after this many bars

persistence:
  db_path: data/cryptotrader.sqlite
