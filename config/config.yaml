mode: backtest
exchange:
  id: binance
  symbol: BTC/USDT
  timeframe: 4h
data:
  history_days: 730
  cache_dir: .cache/ohlcv
  sim_source: auto
  sim_days: 90
  train_symbols:
  - ETH/USDT
  trade_symbols:
  - BTC/USDT
features:
  atr_period: 14
  vwap_window: 60
  momentum_windows:
  - 3
  - 5
  - 15
  extra_momentum: 30
  volume_spike_window: 30
  zscore_window: 60
  rsi_fast: 7
  rsi_slow: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  stoch_k: 14
  stoch_d: 3
  bollinger_window: 20
  bollinger_std: 2.0
  adx_period: 14
  donchian: 20
  parkinson: 20
  obv_z: 30
  amihud: 20
  fracdiff_d: 0.4
  fracdiff_window: 60
  # Orthogonal market-context modules. The COMBINATION passed a 2-structure walk-forward
  # robustness check (both windows positive, profit-factor up in both: 1.39->1.69 and
  # 1.32->1.49) — unlike cross-asset/HTF/taker-flow which overfit. Funding = free Binance
  # USDⓈ-M perp positioning; breadth = how the alt basket moves. Retrain symbols to use them.
  use_funding: true        # perpetual funding rate (positioning / sentiment)
  use_breadth: true        # market breadth: avg basket return, % positive, BTC vs market
  # (use_open_interest stays off: Binance caps OI history at ~30 days -> flat for training.)
model:
  n_estimators: 250
  learning_rate: 0.02
  num_leaves: 15
  max_depth: -1
  min_child_samples: 150
  subsample: 0.8
  colsample_bytree: 0.6
  reg_lambda: 5.0
  class_weight: null
  random_state: 42
  ensemble_size: 7
  bagging_freq: 1
  eval_fraction: 0.2
  drop_features:
  - hour_cos
  - hour_sin
  - up_streak
  - ofi_z
  - ret_1
  - obv_z
  - clv
  - body_pct
  - mom_accel
  - lower_wick
  - rsi
  - vol_z
  test_fraction: 0.25
  use_meta_labeling: false
risk:
  account_equity: 10000.0
  risk_per_trade: 0.005
  atr_stop_mult: 2.0
  atr_trail_mult: 1.5
  max_open_positions: 1
  max_leverage: 1.0
  cooldown_bars: 3
  use_ev_filter: true
  min_expected_value: 0.0
  min_edge_cost_ratio: 8.0
execution:
  taker_fee: 0.0004
  slippage_bps: 1.0
strategy:
  long_threshold: 0.5
  short_threshold: 0.5
  allow_short: true
barriers:
  tp_mult: 2.0
  sl_mult: 1.0
  horizon: 18
  label_tp_mult: 1.5
  label_sl_mult: 1.5
persistence:
  db_path: data/cryptotrader.sqlite
