# config/config.yaml
# Central runtime configuration. Loaded by cryptotrader.config.Settings.
# Secrets (API keys) should come from environment variables, NOT this file.

mode: backtest            # backtest | live

exchange:
  id: binance             # any ccxt-supported id (binance, bybit, ...)
  symbol: BTC/USDT
  timeframe: 4h           # 4h: far less cost drag than 1h. Cost is a fixed ~10bps of
                          # notional per trade regardless of timeframe, but the ATR (hence
                          # the move we harvest) is much larger on 4h, so the breakeven
                          # win-rate drops and the marginal edge survives costs. Walk-forward
                          # flips from -45% (1h) to positive on 4h.
  # api_key / api_secret are read from env: CT_EXCHANGE__API_KEY, CT_EXCHANGE__API_SECRET

data:
  history_days: 730       # how much history to pull for backtests
  cache_dir: .cache/ohlcv
  # Pool ETH into the TRAINING set (BTC is still what we trade/test). ETH is the most
  # BTC-correlated major, so it roughly doubles the training data with relevant dynamics
  # and fights overfitting on the small 4h history — lifting the walk-forward from
  # +8.2% to +16.1% / PF 1.45 / 4-5 folds, ROBUST. Adding SOL instead HURT (regime noise),
  # so keep the pool to closely-correlated assets.
  train_symbols:
    - ETH/USDT
  # replay_file: models/holdout.parquet   # dashboard sim replays this real slice

# Every indicator window is tunable here (all in bars). Any field can also be
# overridden via env: e.g. CT_FEATURES__RSI_SLOW=21
features:
  atr_period: 14
  vwap_window: 60
  momentum_windows: [3, 5, 15]
  extra_momentum: 30
  volume_spike_window: 30
  zscore_window: 60
  rsi_fast: 7
  rsi_slow: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  stoch_k: 14
  stoch_d: 3
  bollinger_window: 20
  bollinger_std: 2.0
  adx_period: 14
  donchian: 20
  parkinson: 20
  obv_z: 30
  amihud: 20
  fracdiff_d: 0.4         # fractional differentiation order (0..1)
  fracdiff_window: 60

# LightGBM hyperparameters + training controls. Tune freely (or via env, e.g.
# CT_MODEL__N_ESTIMATORS=800 CT_MODEL__LEARNING_RATE=0.02).
model:
  # Heavily regularised on purpose. Crypto bars are noisy and the 4h training set is
  # only a few thousand rows; the old high-capacity defaults (num_leaves 63, 400 trees)
  # fit the noise and collapsed out-of-sample (train looked fine, every OOS fold lost).
  # Shallower trees + larger leaves + stronger L2 generalise materially better.
  n_estimators: 250
  learning_rate: 0.02
  num_leaves: 15
  max_depth: -1
  min_child_samples: 150
  subsample: 0.8
  colsample_bytree: 0.6
  reg_lambda: 5.0
  class_weight: null      # null = off; "balanced" upweights directional classes (A/B test it)
  random_state: 42        # fix the seed so runs are reproducible & comparable
  ensemble_size: 7        # average 7 seed-varied models — cancels seed/sampling variance,
                          # the dominant noise on a ~2-3k-row training set. Lifts the 4h
                          # walk-forward to +8.2% / PF 1.24 / 4-5 of 5 folds, ROBUST.
  bagging_freq: 1         # >0 so `subsample` actually row-bags (it is a no-op at 0) — adds
                          # both regularisation and the diversity the ensemble needs.
  eval_fraction: 0.2      # validation slice inside the training data
  # Anti-overfit pruning. These 12 features had the lowest gain-importance averaged
  # across all 5 walk-forward folds (measured independently of returns). Dropping them
  # makes every fold positive (5/5, vs 4/5 with the full set) at the cost of a little
  # peak return — a better risk-adjusted, generalisation-friendly profile. Calendar
  # features (hour_*) carry little on 4h (only 6 bars/day); the rest are noisy micro.
  drop_features:
    - hour_cos
    - hour_sin
    - up_streak
    - ofi_z
    - ret_1
    - obv_z
    - clv
    - body_pct
    - mom_accel
    - lower_wick
    - rsi
    - vol_z
  test_fraction: 0.25     # held-out slice for the final evaluation/backtest
  use_meta_labeling: false  # OFF. The meta P(win) carried no discriminative power here (a
                            # higher confidence threshold did not raise the realised win-rate),
                            # so it only added noise + a refit distribution-shift and filtered
                            # out good trades. Disabling it flipped the 4h walk-forward from
                            # +2.9% / MIXED to +10.6% / ROBUST (4/5 folds, PF 1.32). The EV gate
                            # then uses the primary's own class probability as P(win).

risk:
  account_equity: 10000.0
  risk_per_trade: 0.005   # 0.5 % of equity risked per trade
  atr_stop_mult: 2.0      # (legacy) hard stop multiple; exits now use barriers
  atr_trail_mult: 1.5     # (legacy) trailing distance; exits now use barriers
  max_open_positions: 1
  # --- Cost control ---
  max_leverage: 1.0       # cap notional at 1x equity -> fees stay proportional
  cooldown_bars: 3        # wait N bars after a trade before re-entering
  # Expected-value entry gate: trade only if P(win)*tp-(1-P(win))*sl-cost > min_ev.
  # Self-calibrates to fees (no cost-coupling). Needs meta-labeling for a real P(win).
  use_ev_filter: true
  min_expected_value: 0.0
  min_edge_cost_ratio: 8.0  # legacy fallback, only used when use_ev_filter=false

execution:
  taker_fee: 0.0004       # 4 bps (Binance taker); use maker/VIP fees if you have them
  slippage_bps: 1.0       # assumed slippage in basis points per fill

strategy:
  long_threshold: 0.50    # permissive: the EV gate is now the real filter
  short_threshold: 0.50
  allow_short: true
  model_path: models/model.pkl   # trained model loaded by the live/sim engine at start.
                                  # Safe if absent: the engine falls back to the momentum
                                  # baseline until you run a training (Dashboard "Train now"
                                  # or scripts/train_model.py writes exactly this file).

# Triple barriers — shared by the training labels AND the trade exits, so the
# backtest/live engine harvests exactly what the model was trained to predict.
barriers:
  # Two SEPARATE barrier sets (see BarrierConfig docstring):
  #  * trade exits below — asymmetric 2:1 reward:risk (let winners run, cut losers).
  #  * label barriers     — SYMMETRIC, so the direction labels are unbiased. An
  #    asymmetric tp/sl makes the nearer barrier far easier to touch, which biased
  #    the labels (and the model) toward the short side and bled badly in the uptrend.
  tp_mult: 2.0            # take-profit distance in ATR units (trade exit)
  sl_mult: 1.0            # stop-loss distance in ATR units (trade exit)
  horizon: 18             # time-based exit after this many bars
  label_tp_mult: 1.5      # labelling barrier (symmetric)
  label_sl_mult: 1.5      # labelling barrier (symmetric)

persistence:
  db_path: data/cryptotrader.sqlite
