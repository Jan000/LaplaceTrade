# 24/7 deployment: `docker compose up -d`. Auto-restarts on crash/reboot.
services:
  cryptotrader:
    build: .
    container_name: cryptotrader
    restart: unless-stopped            # crash-recovery / survives host reboot
    ports:
      - "127.0.0.1:8000:8000"          # localhost only — front with a reverse proxy + auth for remote
    volumes:
      - ./data:/app/data               # SQLite DB (trades, equity, observations)
      - ./models:/app/models           # trained models + experiments.jsonl
      - ./.cache:/app/.cache           # OHLCV cache
      - ./config:/app/config           # config.yaml + secrets.yaml (keys)
    environment:
      # API keys may also live in config/secrets.yaml; env wins.
      - CT_EXCHANGE__API_KEY=${CT_EXCHANGE__API_KEY:-}
      - CT_EXCHANGE__API_SECRET=${CT_EXCHANGE__API_SECRET:-}
    stop_grace_period: 30s             # let the engine flatten/clean up on shutdown
