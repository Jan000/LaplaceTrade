<!doctype html>
<!-- src/cryptotrader/api/static/dashboard.html -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoTrader · Control Center</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b0e14; --panel: #131722; --panel2: #1b2230; --line: #2a3344;
      --txt: #d6dee8; --muted: #8a97a8; --green: #16c784; --red: #ea3943;
      --accent: #3b82f6; --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--txt); }
    header { display: flex; align-items: center; gap: 16px; padding: 14px 22px;
             border-bottom: 1px solid var(--line); background: var(--panel); }
    header h1 { font-size: 16px; margin: 0; letter-spacing: .3px; }
    header .sym { color: var(--muted); font-size: 13px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.stopped, .dot.idle { background: var(--muted); }
    .dot.error { background: var(--red); }
    .spacer { flex: 1; }
    .controls { display: flex; align-items: center; gap: 8px; }
    select, button { background: var(--panel2); color: var(--txt); border: 1px solid var(--line);
            border-radius: 7px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.danger { background: var(--red); border-color: var(--red); color: #fff; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    main { padding: 18px 22px; display: grid; gap: 16px;
           grid-template-columns: repeat(4, 1fr); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 11px;
            padding: 16px; }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase;
                   letter-spacing: .5px; }
    .card .value { font-size: 24px; font-weight: 600; margin-top: 6px; }
    .pos { color: var(--green); } .neg { color: var(--red); }
    .wide { grid-column: span 4; }
    .half { grid-column: span 2; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th, td { text-align: right; padding: 7px 10px; border-bottom: 1px solid var(--line); }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 500; position: sticky; top: 0; background: var(--panel); }
    .tbl-wrap { max-height: 320px; overflow: auto; }
    .pill { padding: 2px 8px; border-radius: 6px; font-size: 11px; }
    .pill.LONG { background: rgba(22,199,132,.15); color: var(--green); }
    .pill.SHORT { background: rgba(234,57,67,.15); color: var(--red); }
    .reason { color: var(--muted); }
    h2 { font-size: 13px; color: var(--muted); margin: 0 0 12px; text-transform: uppercase;
         letter-spacing: .5px; }
    .flat { color: var(--muted); padding: 18px 4px; }
  </style>
</head>
<body>
  <header>
    <span id="status-dot" class="dot idle"></span>
    <h1>CryptoTrader <span class="sym" id="sym">—</span></h1>
    <span class="sym" id="mode-label">idle</span>
    <div class="spacer"></div>
    <div class="controls">
      <select id="mode">
        <option value="simulation">Simulation (synthetic, offline)</option>
        <option value="live">Live data (paper fills)</option>
      </select>
      <button id="start" class="primary">Start</button>
      <button id="stop" class="danger" disabled>Stop</button>
    </div>
  </header>

  <main>
    <div class="card"><div class="label">Equity</div><div class="value" id="equity">—</div></div>
    <div class="card"><div class="label">Total Return</div><div class="value" id="ret">—</div></div>
    <div class="card"><div class="label">Unrealized PnL</div><div class="value" id="upnl">—</div></div>
    <div class="card"><div class="label">Last Price</div><div class="value" id="price">—</div></div>

    <div class="card"><div class="label">Trades</div><div class="value" id="ntrades">0</div></div>
    <div class="card"><div class="label">Win Rate</div><div class="value" id="winrate">—</div></div>
    <div class="card"><div class="label">Avg Efficiency</div><div class="value" id="eff">—</div></div>
    <div class="card"><div class="label">Open Position</div><div class="value" id="pos" style="font-size:16px">Flat</div></div>

    <div class="card wide">
      <h2>Equity Curve</h2>
      <canvas id="chart" height="90"></canvas>
    </div>

    <div class="card wide">
      <h2>Recent Trades</h2>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Side</th><th>Entry</th><th>Exit</th><th>Net PnL</th>
            <th>Efficiency</th><th>Reason</th><th>Exit Time</th>
          </tr></thead>
          <tbody id="trades"><tr><td colspan="7" class="flat">No trades yet.</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n, d = 2) => (n ?? 0).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
    const signClass = (n) => (n > 0 ? "pos" : n < 0 ? "neg" : "");

    const chart = new Chart($("chart"), {
      type: "line",
      data: { labels: [], datasets: [{
        data: [], borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,.12)",
        fill: true, tension: .15, pointRadius: 0, borderWidth: 2 }] },
      options: { responsive: true, animation: false, plugins: { legend: { display: false } },
        scales: { x: { display: false }, y: { ticks: { color: "#8a97a8" }, grid: { color: "#1b2230" } } } }
    });

    function render(s) {
      $("sym").textContent = s.symbol || "—";
      $("mode-label").textContent = s.status === "running" ? `${s.mode} · running` : s.status;
      $("status-dot").className = "dot " + (s.status || "idle");
      $("equity").textContent = "$" + fmt(s.equity);
      const ret = $("ret"); ret.textContent = fmt(s.total_return_pct) + "%"; ret.className = "value " + signClass(s.total_return_pct);
      const up = $("upnl"); up.textContent = "$" + fmt(s.unrealized_pnl); up.className = "value " + signClass(s.unrealized_pnl);
      $("price").textContent = "$" + fmt(s.last_price);
      $("ntrades").textContent = s.n_trades ?? 0;
      $("winrate").textContent = fmt((s.win_rate ?? 0) * 100, 1) + "%";
      $("eff").textContent = fmt((s.avg_efficiency_ratio ?? 0) * 100, 1) + "%";

      const pos = $("pos");
      if (s.position) {
        pos.innerHTML = `<span class="pill ${s.position.side}">${s.position.side}</span> ${fmt(s.position.quantity,4)} @ $${fmt(s.position.entry_price)} · stop $${fmt(s.position.stop)}`;
      } else { pos.textContent = "Flat"; }

      if (s.equity_curve && s.equity_curve.length) {
        chart.data.labels = s.equity_curve.map(p => p.t);
        chart.data.datasets[0].data = s.equity_curve.map(p => p.equity);
        chart.update("none");
      }

      const tb = $("trades");
      if (s.recent_trades && s.recent_trades.length) {
        tb.innerHTML = s.recent_trades.map(t => `
          <tr>
            <td><span class="pill ${t.side}">${t.side}</span></td>
            <td>$${fmt(t.entry_price)}</td><td>$${fmt(t.exit_price)}</td>
            <td class="${signClass(t.net_pnl)}">$${fmt(t.net_pnl, 2)}</td>
            <td>${fmt(t.efficiency_ratio * 100, 1)}%</td>
            <td class="reason">${t.exit_reason}</td>
            <td class="reason">${(t.exit_time || "").slice(11, 19)}</td>
          </tr>`).join("");
      }
    }

    function setRunning(running) {
      $("start").disabled = running; $("stop").disabled = !running; $("mode").disabled = running;
    }

    $("start").onclick = async () => {
      setRunning(true);
      try {
        const r = await fetch("/api/start", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mode: $("mode").value }) });
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          $("mode-label").textContent = "error: " + (body.error || r.statusText);
          $("status-dot").className = "dot error";
          setRunning(false);
        }
      } catch (e) {
        $("mode-label").textContent = "error: cannot reach server";
        $("status-dot").className = "dot error";
        setRunning(false);
      }
    };
    $("stop").onclick = async () => {
      await fetch("/api/stop", { method: "POST" }); setRunning(false);
    };

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onmessage = (e) => { const s = JSON.parse(e.data); render(s); setRunning(s.status === "running"); };
      ws.onclose = () => setTimeout(connect, 1500);
    }
    connect();
    fetch("/api/state").then(r => r.json()).then(render);
  </script>
</body>
</html>
