<!doctype html>
<!-- src/cryptotrader/api/static/dashboard.html -->
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CryptoTrader · Control Center</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0b0e14;--panel:#131722;--panel2:#1b2230;--line:#2a3344;--txt:#d6dee8;--muted:#8a97a8;
        --green:#16c784;--red:#ea3943;--accent:#3b82f6;--amber:#f59e0b;}
  *{box-sizing:border-box;} body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10;}
  header h1{font-size:16px;margin:0;letter-spacing:.3px;} .sym{color:var(--muted);font-size:13px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.running{background:var(--green);box-shadow:0 0 8px var(--green);} .dot.stopped,.dot.idle{background:var(--muted);} .dot.error{background:var(--red);}
  .spacer{flex:1;} .controls{display:flex;align-items:center;gap:8px;}
  select,button,input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:7px 12px;font-size:13px;}
  button{cursor:pointer;} button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.danger{background:var(--red);border-color:var(--red);color:#fff;} button.ghost{background:transparent;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  main{padding:18px 22px;display:grid;gap:16px;grid-template-columns:repeat(4,1fr);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px;}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;}
  .card .value{font-size:24px;font-weight:600;margin-top:6px;} .pos{color:var(--green);} .neg{color:var(--red);}
  .wide{grid-column:span 4;} table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{text-align:right;padding:7px 10px;border-bottom:1px solid var(--line);} th:first-child,td:first-child{text-align:left;}
  th{color:var(--muted);font-weight:500;} .tbl-wrap{max-height:300px;overflow:auto;}
  .pill{padding:2px 8px;border-radius:6px;font-size:11px;} .pill.LONG{background:rgba(22,199,132,.15);color:var(--green);}
  .pill.SHORT{background:rgba(234,57,67,.15);color:var(--red);} .reason{color:var(--muted);}
  h2{font-size:13px;color:var(--muted);margin:0 0 12px;text-transform:uppercase;letter-spacing:.5px;}
  .flat{color:var(--muted);padding:14px 4px;}
  /* settings */
  .cfg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  fieldset{border:1px solid var(--line);border-radius:9px;padding:12px 14px;}
  legend{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:0 6px;}
  .field{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:5px 0;}
  .field label{color:var(--muted);font-size:12.5px;} .field input[type=text],.field input[type=number]{width:130px;text-align:right;}
  .field input[type=checkbox]{width:auto;}
  #train-log{white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted);
             background:#0d1018;border:1px solid var(--line);border-radius:8px;padding:10px;max-height:260px;overflow:auto;}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .hidden{display:none;}
</style>
</head>
<body>
<header>
  <span id="status-dot" class="dot idle"></span>
  <h1>CryptoTrader <span class="sym" id="sym">—</span></h1>
  <span class="sym" id="mode-label">idle</span>
  <div class="spacer"></div>
  <div class="controls">
    <button id="tab-monitor" class="primary">Monitor</button>
    <button id="tab-settings" class="ghost">Settings &amp; Training</button>
    <select id="mode"><option value="simulation">Simulation</option><option value="live">Live data (paper)</option></select>
    <button id="start" class="primary">Start</button>
    <button id="stop" class="danger" disabled>Stop</button>
  </div>
</header>

<!-- ============ MONITOR ============ -->
<main id="view-monitor">
  <div class="card"><div class="label">Equity</div><div class="value" id="equity">—</div></div>
  <div class="card"><div class="label">Total Return</div><div class="value" id="ret">—</div></div>
  <div class="card"><div class="label">Unrealized PnL</div><div class="value" id="upnl">—</div></div>
  <div class="card"><div class="label">Last Price</div><div class="value" id="price">—</div></div>
  <div class="card"><div class="label">Trades</div><div class="value" id="ntrades">0</div></div>
  <div class="card"><div class="label">Win Rate</div><div class="value" id="winrate">—</div></div>
  <div class="card"><div class="label">Avg Efficiency</div><div class="value" id="eff">—</div></div>
  <div class="card"><div class="label">Open Position</div><div class="value" id="pos" style="font-size:16px">Flat</div></div>
  <div class="card wide"><h2>Equity Curve</h2><canvas id="chart" height="90"></canvas></div>
  <div class="card wide"><h2>Recent Trades</h2><div class="tbl-wrap"><table>
    <thead><tr><th>Side</th><th>Entry</th><th>Exit</th><th>Net PnL</th><th>Efficiency</th><th>Reason</th><th>Exit</th></tr></thead>
    <tbody id="trades"><tr><td colspan="7" class="flat">No trades yet.</td></tr></tbody></table></div></div>
</main>

<!-- ============ SETTINGS & TRAINING ============ -->
<main id="view-settings" class="hidden">
  <div class="card wide">
    <div class="row">
      <h2 style="margin:0">All Parameters</h2><div class="spacer"></div>
      <span id="cfg-msg" class="sym"></span>
      <button id="cfg-reload" class="ghost">Reload</button>
      <button id="cfg-save" class="primary">Save to config.yaml</button>
    </div>
    <div id="cfg-form" class="cfg-grid"></div>
  </div>
  <div class="card wide">
    <div class="row">
      <h2 style="margin:0">Training</h2><div class="spacer"></div>
      <span id="train-state" class="sym">idle</span>
      <button id="train-btn" class="primary">Train now (uses saved config)</button>
    </div>
    <div id="train-log">Train output will appear here…</div>
  </div>
</main>

<script>
const $=(id)=>document.getElementById(id);
const fmt=(n,d=2)=>(n??0).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const sign=(n)=>n>0?"pos":n<0?"neg":"";

/* ---------- view switching ---------- */
$("tab-monitor").onclick=()=>{ $("view-monitor").classList.remove("hidden"); $("view-settings").classList.add("hidden");
  $("tab-monitor").className="primary"; $("tab-settings").className="ghost"; };
$("tab-settings").onclick=()=>{ $("view-settings").classList.remove("hidden"); $("view-monitor").classList.add("hidden");
  $("tab-settings").className="primary"; $("tab-monitor").className="ghost"; loadConfig(); };

/* ---------- monitor ---------- */
const chart=new Chart($("chart"),{type:"line",data:{labels:[],datasets:[{data:[],borderColor:"#3b82f6",
  backgroundColor:"rgba(59,130,246,.12)",fill:true,tension:.15,pointRadius:0,borderWidth:2}]},
  options:{responsive:true,animation:false,plugins:{legend:{display:false}},
  scales:{x:{display:false},y:{ticks:{color:"#8a97a8"},grid:{color:"#1b2230"}}}}});
function render(s){
  $("sym").textContent=s.symbol||"—";
  $("mode-label").textContent=s.status==="running"?`${s.mode} · running`:s.status;
  $("status-dot").className="dot "+(s.status||"idle");
  $("equity").textContent="$"+fmt(s.equity);
  const r=$("ret"); r.textContent=fmt(s.total_return_pct)+"%"; r.className="value "+sign(s.total_return_pct);
  const u=$("upnl"); u.textContent="$"+fmt(s.unrealized_pnl); u.className="value "+sign(s.unrealized_pnl);
  $("price").textContent="$"+fmt(s.last_price); $("ntrades").textContent=s.n_trades??0;
  $("winrate").textContent=fmt((s.win_rate??0)*100,1)+"%"; $("eff").textContent=fmt((s.avg_efficiency_ratio??0)*100,1)+"%";
  const p=$("pos"); p.innerHTML=s.position?`<span class="pill ${s.position.side}">${s.position.side}</span> ${fmt(s.position.quantity,4)} @ $${fmt(s.position.entry_price)}`:"Flat";
  if(s.equity_curve&&s.equity_curve.length){chart.data.labels=s.equity_curve.map(p=>p.t);
    chart.data.datasets[0].data=s.equity_curve.map(p=>p.equity); chart.update("none");}
  const tb=$("trades");
  if(s.recent_trades&&s.recent_trades.length){tb.innerHTML=s.recent_trades.map(t=>`<tr>
    <td><span class="pill ${t.side}">${t.side}</span></td><td>$${fmt(t.entry_price)}</td><td>$${fmt(t.exit_price)}</td>
    <td class="${sign(t.net_pnl)}">$${fmt(t.net_pnl,2)}</td><td>${fmt(t.efficiency_ratio*100,1)}%</td>
    <td class="reason">${t.exit_reason}</td><td class="reason">${(t.exit_time||"").slice(11,19)}</td></tr>`).join("");}
}
function setRunning(r){$("start").disabled=r;$("stop").disabled=!r;$("mode").disabled=r;}
$("start").onclick=async()=>{setRunning(true);
  try{const x=await fetch("/api/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode:$("mode").value})});
    if(!x.ok){const b=await x.json().catch(()=>({}));$("mode-label").textContent="error: "+(b.error||x.statusText);$("status-dot").className="dot error";setRunning(false);}}
  catch(e){$("mode-label").textContent="error: cannot reach server";setRunning(false);}};
$("stop").onclick=async()=>{await fetch("/api/stop",{method:"POST"});setRunning(false);};
function connect(){const ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage=(e)=>{const s=JSON.parse(e.data);render(s);setRunning(s.status==="running");};
  ws.onclose=()=>setTimeout(connect,1500);}
connect(); fetch("/api/state").then(r=>r.json()).then(render);

/* ---------- config editor ---------- */
let CONFIG={};
const EDIT_SECTIONS=["exchange","data","features","model","risk","execution","strategy","barriers"];
function inputFor(section,key,val){
  const id=`cfg__${section}__${key}`;
  if(typeof val==="boolean") return `<input type="checkbox" id="${id}" ${val?"checked":""}>`;
  if(Array.isArray(val)) return `<input type="text" id="${id}" value="${val.join(', ')}">`;
  if(typeof val==="number") return `<input type="number" step="any" id="${id}" value="${val}">`;
  if(val===null) return `<input type="text" id="${id}" value="" placeholder="null">`;
  return `<input type="text" id="${id}" value="${val??''}">`;
}
function loadConfig(){
  fetch("/api/config").then(r=>r.json()).then(cfg=>{CONFIG=cfg;
    $("cfg-form").innerHTML=EDIT_SECTIONS.map(sec=>{const obj=cfg[sec]||{};
      const fields=Object.keys(obj).filter(k=>!["api_key","api_secret"].includes(k)).map(k=>
        `<div class="field"><label title="${sec}.${k}">${k}</label>${inputFor(sec,k,obj[k])}</div>`).join("");
      return `<fieldset><legend>${sec}</legend>${fields}</fieldset>`;}).join("");
    $("cfg-msg").textContent="";});
}
function collectConfig(){
  const out={};
  for(const sec of EDIT_SECTIONS){const obj=CONFIG[sec]||{};out[sec]={};
    for(const k of Object.keys(obj)){if(["api_key","api_secret"].includes(k))continue;
      const el=$(`cfg__${sec}__${k}`); if(!el)continue; const orig=obj[k];
      let v; if(typeof orig==="boolean")v=el.checked;
      else if(Array.isArray(orig)){const parts=el.value.split(",").map(x=>x.trim()).filter(x=>x);
        const allNum=orig.every(x=>typeof x==="number");
        v=allNum?parts.map(Number):parts;}  /* keep string lists (train_symbols, drop_features) as strings */
      else if(typeof orig==="number")v=el.value===""?orig:Number(el.value);
      else if(orig===null)v=el.value===""?null:el.value;
      else v=el.value;
      out[sec][k]=v;}}
  return out;
}
$("cfg-reload").onclick=loadConfig;
$("cfg-save").onclick=async()=>{$("cfg-msg").textContent="saving…";
  const r=await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(collectConfig())});
  const b=await r.json(); $("cfg-msg").textContent=r.ok?"saved ✓":("error: "+(b.error||"")); };

/* ---------- training ---------- */
let trainTimer=null;
$("train-btn").onclick=async()=>{await fetch("/api/train",{method:"POST"}); pollTrain(true);};
function pollTrain(loop){fetch("/api/train/status").then(r=>r.json()).then(s=>{
  $("train-state").textContent=s.status; $("train-log").textContent=s.log||"(no output yet)";
  $("train-log").scrollTop=$("train-log").scrollHeight; $("train-btn").disabled=s.running;
  if(loop){clearInterval(trainTimer); trainTimer=setInterval(()=>pollTrain(false),2000);}
  if(!s.running&&trainTimer&&!loop){/* keep last */}});}
</script>
</body></html>
